<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a2540;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5a0;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#00e5a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cfff;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="candleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5a0" />
      <stop offset="100%" style="stop-color:#00b87a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="256" height="256" rx="48" ry="48"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#00e5a0" stroke-width="0.5">
    <line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="64" y1="0" x2="64" y2="256"/>
    <line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="192" y1="0" x2="192" y2="256"/>
  </g>

  <!-- Pulse / ECG line across middle -->
  <polyline
    points="18,128 52,128 62,100 72,155 82,88 92,165 102,128 148,128 158,108 168,148 178,118 188,138 198,128 238,128"
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
    opacity="0.85"
  />

  <!-- Candlestick cluster — left group -->
  <!-- Candle 1 (bearish, red) -->
  <line x1="74" y1="68" x2="74" y2="100" stroke="#ff4d6d" stroke-width="1.5" opacity="0.7"/>
  <rect x="69" y="76" width="10" height="18" rx="1" fill="#ff4d6d" opacity="0.7"/>
  <line x1="74" y1="94" x2="74" y2="108" stroke="#ff4d6d" stroke-width="1.5" opacity="0.7"/>

  <!-- Candle 2 (bullish, green) -->
  <line x1="92" y1="65" x2="92" y2="88" stroke="#00e5a0" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="87" y="70" width="10" height="22" rx="1" fill="url(#candleGrad)" filter="url(#glow)"/>
  <line x1="92" y1="92" x2="92" y2="108" stroke="#00e5a0" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Candle 3 (bearish small) -->
  <line x1="110" y1="70" x2="110" y2="95" stroke="#ff4d6d" stroke-width="1.5" opacity="0.6"/>
  <rect x="105" y="76" width="10" height="14" rx="1" fill="#ff4d6d" opacity="0.6"/>
  <line x1="110" y1="90" x2="110" y2="106" stroke="#ff4d6d" stroke-width="1.5" opacity="0.6"/>

  <!-- Candle 4 (bullish large) -->
  <line x1="146" y1="58" x2="146" y2="82" stroke="#00e5a0" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="141" y="65" width="10" height="28" rx="1" fill="url(#candleGrad)" filter="url(#glow)"/>
  <line x1="146" y1="93" x2="146" y2="112" stroke="#00e5a0" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Candle 5 (bullish medium) -->
  <line x1="164" y1="62" x2="164" y2="80" stroke="#00e5a0" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="159" y="68" width="10" height="20" rx="1" fill="url(#candleGrad)" filter="url(#glow)"/>
  <line x1="164" y1="88" x2="164" y2="104" stroke="#00e5a0" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Candle 6 (bearish) -->
  <line x1="182" y1="66" x2="182" y2="90" stroke="#ff4d6d" stroke-width="1.5" opacity="0.65"/>
  <rect x="177" y="72" width="10" height="16" rx="1" fill="#ff4d6d" opacity="0.65"/>
  <line x1="182" y1="88" x2="182" y2="105" stroke="#ff4d6d" stroke-width="1.5" opacity="0.65"/>

  <!-- "TP" monogram text -->
  <text
    x="128"
    y="210"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="42"
    font-weight="700"
    letter-spacing="6"
    fill="#00e5a0"
    filter="url(#glow)"
  >TP</text>

  <!-- Thin separator line above text -->
  <line x1="48" y1="172" x2="208" y2="172" stroke="#00e5a0" stroke-width="0.8" opacity="0.4"/>

  <!-- "TRADEPULSE" label tiny -->
  <text
    x="128"
    y="186"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="10"
    letter-spacing="3.5"
    fill="#00cfff"
    opacity="0.7"
  >TRADEPULSE</text>

  <!-- Corner accent dots -->
  <circle cx="30" cy="30" r="2.5" fill="#00e5a0" opacity="0.5"/>
  <circle cx="226" cy="30" r="2.5" fill="#00e5a0" opacity="0.5"/>
  <circle cx="30" cy="226" r="2.5" fill="#00e5a0" opacity="0.3"/>
  <circle cx="226" cy="226" r="2.5" fill="#00e5a0" opacity="0.3"/>
</svg>
